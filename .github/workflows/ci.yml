name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.18.2

      - name: Install shards
        run: shards install

      - name: Run specs
        run: crystal spec

      - name: Download sample test image
        run: |
          curl -sL -o bench/test_1080p.jpg "https://www.w3schools.com/css/img_5terre.jpg"
          file bench/test_1080p.jpg

      - name: Run color-thief adapter on sample image
        run: |
          crystal run examples/color_thief_adapter.cr -- bench/test_1080p.jpg 5 10 0 > out.json
          # Validate JSON produced
          python3 -m json.tool out.json
